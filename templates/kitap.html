<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kitap Detayı</title>
  <style>
   body {
  font-family: 'Segoe UI', sans-serif;
  background-color: #0f1117;
  color: #e3e3e3;
  margin: 0;
  padding: 0;
}

.yeni-header {
  background-color: #1c1f26;
  padding: 16px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: white;
}

.logo-alani {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  width: 32px;
  height: 32px;
}

.logo-yazi {
  font-size: 20px;
  font-weight: bold;
}

.arama-kapsayici {
  display: flex;
  flex: 1;
  max-width: 500px;
  margin: 0 20px;
  gap: 10px;
}

.arama-input {
  flex: 1;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  background-color: #2c2f36;
  color: white;
}

.sube-select {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background-color: #2c2f36;
  color: white;
}

.menu-alani {
  display: flex;
  align-items: center;
  gap: 15px;
}

.menu-alani a {
  background-color: #2c2f36;
  color: white;
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 16px;
  font-weight: bold;
}

.profile-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
}

.kitap-detay {
  display: flex;
  gap: 40px;
  padding: 40px;
}

.kitap-detay img {
  width: 200px;
  border-radius: 10px;
}

.bilgiler {
  max-width: 600px;
}

.bilgiler h2 {
  margin-bottom: 10px;
}

.bilgiler .yazar, .yayinevi, .puan {
  font-size: 16px;
  margin-bottom: 6px;
}

.bilgiler p {
  margin-top: 15px;
  line-height: 1.5;
}

.kirala-btn {
  margin-top: 20px;
  padding: 10px 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

.arama-btn {
  background-color: #007bff;
  color: white;
  padding: 10px 24px;
  border: none;
  border-radius: 40px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background-color 0.3s;
}

.arama-btn:hover {
  background-color: #0056b3;
}


  </style>
</head>
<body>

<header class="yeni-header">
  <div class="logo-alani">
    <img src="https://cdn-icons-png.flaticon.com/512/29/29302.png" alt="Logo" class="logo">
    <span class="logo-yazi">Kitabım Burada</span>
  </div>
  <div class="arama-kapsayici">
    <input type="text" id="aramaInput" placeholder="Kitaplarda ara..." class="arama-input" />
    <select class="sube-select">
      <option>Şube Seç...</option>
    </select>
<button id="aramaBtn" class="arama-btn">Ara</button>
  </div>
  <div class="menu-alani">
    <a href="index.html">Ana Sayfa</a>
    <a href="kitaplarim.html">Kitaplarım</a>
    <a href="giris.html"><img src="https://cdn-icons-png.flaticon.com/512/1077/1077012.png" class="profile-icon" /></a>
  </div>
</header>

<div class="kitap-detay" id="kitapDetay">
  <img id="kitapGorsel" src="" alt="" />
  <div class="bilgiler">
    <h2 id="kitapBaslik">Yükleniyor...</h2>
    <div class="yazar" id="kitapYazar"></div>
    <div class="yayinevi" id="kitapSube"></div>
    <div class="puan" id="kitapDurum"></div>
    <p id="kitapAciklama"></p>
    <button class="kirala-btn" onclick="kiralaKitap()">Kirala</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (id) {
  fetch(`/api/kitap?id=${id}`)
    .then((res) => res.json())
    .then((kitap) => {
      if (kitap.error) throw new Error(kitap.error);

      document.getElementById("kitapGorsel").src = kitap.gorsel_url || "/static/images/placeholder.png";
      document.getElementById("kitapGorsel").alt = kitap.isim || "Kitap görseli";

      document.getElementById("kitapBaslik").textContent = kitap.isim || "Başlık Yok";
      document.getElementById("kitapYazar").textContent = "Yazar: " + (kitap.yazar || "Bilinmiyor");
      document.getElementById("kitapSube").textContent = "Şube: " + (kitap.sube || "Bilinmiyor");
      document.getElementById("kitapDurum").textContent = "Durum: " + (kitap.durum || "Bilinmiyor");
      document.getElementById("kitapAciklama").textContent = kitap.aciklama || "Açıklama bulunamadı.";

      if (kitap.durum.toLowerCase() !== "mevcut") {
        const kiralaBtn = document.querySelector(".kirala-btn");
        kiralaBtn.disabled = true;
        kiralaBtn.textContent = "Mevcut Değil";
        kiralaBtn.style.backgroundColor = "#555";
        kiralaBtn.style.cursor = "not-allowed";
      }
    })
    .catch((err) => {
      document.getElementById("kitapDetay").innerHTML = "<p>Kitap bulunamadı veya hata oluştu.</p>";
    });
} else {
  document.getElementById("kitapDetay").innerHTML = "<p>Kitap ID belirtilmedi.</p>";
}

function kiralaKitap() {
  const kitap_id = id;

  if (!kitap_id) {
    alert("Kitap ID bulunamadı.");
    return;
  }

  fetch("/api/kirala", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ kitap_id })
  })
  .then(res => res.json())
  .then(data => {
    if (data.durum === "kiralandı") {
      alert("Kitap başarıyla kiralandı!");
      window.location.href = "/kitaplarim.html";
    } else if (data.error) {
      alert(data.error);
    } else {
      alert("Bilinmeyen bir hata oluştu.");
    }
  })
  .catch(err => {
    console.error("Kiralama hatası:", err);
    alert("Sunucu hatası oluştu.");
  });
}




</script>

</body>
</html>
